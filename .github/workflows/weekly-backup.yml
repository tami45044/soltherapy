name: Weekly Data Backup Email

on:
  schedule:
    # Every Sunday at 08:00 Israel time (05:00 UTC)
    - cron: '0 5 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run email backup
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          BACKUP_EMAIL: ${{ secrets.BACKUP_EMAIL || '88sol2026@gmail.com' }}
        run: node scripts/email-backup.js
